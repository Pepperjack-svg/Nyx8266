<!DOCTYPE html><html><head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<meta name=theme-color content=#09090E>
<title>Nyx8266</title>
<link rel=stylesheet href=style.css>
<script src=js/site.js></script>
<script src=js/fs.js></script>
</head><body onload=loadLang()>
<nav><ul class=menu>
<li><a href=scan.html data-translate=scan>Scan</a></li>
<li><a href=ssids.html data-translate=ssids>SSIDs</a></li>
<li><a href=attack.html data-translate=attacks>Attack</a></li>
<li><a href=fsmanager.html class=active>FS</a></li>
<li><a href=settings.html data-translate=settings>Settings</a></li>
</ul></nav>
<div id=status>●</div>
<div class=container>
<h1>FS Manager</h1>

<div class=card>
<h2>Evil Twin &mdash; <a href=/eviltwin style="font-size:.8rem">view portal</a></h2>
<form action=/pathsave method=get class=flex style="flex-wrap:wrap;gap:.5rem">
<input type=text name=path id=eviltwinpath placeholder=/example.html style="flex:1 1 160px">
<input type=submit value=save>
</form>
</div>

<div class=card id=logCard style="display:none">
<h2>Credentials</h2>
<div class=table-wrap>
<table id=log></table>
</div>
</div>

<div class=card>
<h2>Upload File</h2>
<form action=/upload method=post enctype=multipart/form-data class=flex style="flex-wrap:wrap;gap:.5rem;align-items:center">
<label class=file-label>
<input type=file name=upload id=fileInput onchange="this.parentNode.querySelector('span').textContent=this.files[0]?this.files[0].name:'No file chosen'">
<span>No file chosen</span>
</label>
<input type=submit value=Upload>
</form>
</div>

<div class=card>
<p id=fsinfo style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem"></p>
<div class=table-wrap>
<table id=fileList><tr><th>File Name</th><th>Size</th><th></th></tr></table>
</div>
<button onclick=format() class="danger col-12" style="margin-top:.75rem">Format Data</button>
</div>

</div>
<footer>Nyx8266</footer>
</body></html>
