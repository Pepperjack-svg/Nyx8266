<!DOCTYPE html><html><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=theme-color content=#000000><title>Nyx8266</title><link rel=stylesheet href=style.css><script src=js/site.js></script></head><body class=splash><div><div class=splash-title data-value="Nyx8266" id=title>Nyx8266</div><div class=splash-sub>by PepperJack</div></div><script>
var L="ABCDEFGHIJKLMNOPQRSTUVWXYZ",iv=null,el=document.getElementById("title"),val=el.dataset.value,it=0;
function rnd(){return L[Math.floor(Math.random()*26)]}
iv=setInterval(function(){
  el.innerText=el.innerText.split("").map(function(c,i){return i<it?val[i]:rnd();}).join("");
  if(it>=val.length){clearInterval(iv);setTimeout(launch,800);}
  it+=1/3;
},80);
function launch(){
  var n=60;
  for(var i=0;i<n;i++){(function(){
    var b=document.createElement("div");
    b.className="bubble";
    var s=(8+Math.random()*20)+"px";
    b.style.cssText="width:"+s+";height:"+s+";left:"+(Math.random()*100)+"vw;bottom:"+(Math.random()*30)+"vh;background:hsl("+(180+Math.random()*40)+",80%,60%);animation-duration:"+(3+Math.random()*5)+"s;animation-delay:"+(Math.random()*1.5)+"s";
    document.body.appendChild(b);
    b.addEventListener("animationend",function(){b.remove();});
  })();}
  setTimeout(function(){window.location.href="/scan.html";},5000);
}
</script></body></html>
